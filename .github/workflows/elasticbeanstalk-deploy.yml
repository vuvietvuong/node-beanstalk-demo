name: CI/CD — Deploy to Elastic Beanstalk

on:
  push:
    branches: [ main, develop ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build (if present)
        run: npm run build --if-present

      - name: Archive application
        run: |
          rm -f app.zip
          zip -r app.zip . -x "*.git*" "node_modules/*" ".github/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Upload artifact to S3 and create EB version
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          APP_NAME: ${{ secrets.EB_APPLICATION_NAME }}
          ENV_NAME: ${{ secrets.EB_ENVIRONMENT_NAME }}
        run: |
          set -e
          version=${{ github.sha }}
          aws s3 cp app.zip s3://$S3_BUCKET/$version.zip
          aws elasticbeanstalk create-application-version --application-name "$APP_NAME" --version-label "$version" --source-bundle S3Bucket="$S3_BUCKET",S3Key="$version.zip"
          aws elasticbeanstalk update-environment --application-name "$APP_NAME" --environment-name "$ENV_NAME" --version-label "$version"
